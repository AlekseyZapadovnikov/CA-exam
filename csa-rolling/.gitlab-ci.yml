# all jobs on deploy because markdownlint shouldn't block updates.

markdownlint:
  stage: test
  image:
    name: ghcr.io/igorshubovych/markdownlint-cli:latest
    entrypoint: [""]
  script:
    - markdownlint --ignore "archive/**/*" . -c .markdownlint.yaml

