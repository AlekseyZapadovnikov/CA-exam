image-size-check:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  image:
    name: "alpine/httpie"  # the smallest from available
    entrypoint: [""]
  script:
    - "./ci/check-image-size.sh"
